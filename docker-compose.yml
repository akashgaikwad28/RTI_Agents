version: "3.9"

services:

  # ── MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: rti_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: rti_db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: rti_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── RTI-Agent App ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rti_agent:v2
    container_name: rti_agent_app
    restart: on-failure
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      FAISS_TOP_K: 5
      MAX_SCRAPE_DEPTH: 1
      EMBEDDING_BATCH_SIZE: 32
      RAG_CACHE_TTL: 3600
      MAX_PDF_SIZE_MB: 25
    ports:
      - "8000:8000"
    volumes:
      - ./data:/home/appuser/app/data
      - ./logs:/home/appuser/app/logs
      - ./rag/ingestion/corpus:/home/appuser/app/rag/ingestion/corpus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: rti_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: rti_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  frontend:
    image: node:22-alpine
    container_name: rti_frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run start"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_API_KEY: change-me-before-production
    volumes:
      - ./frontend:/app
    ports:
      - "3001:3000"
    depends_on:
      - app

volumes:
  mongo_data:
  redis_data:
  prometheus_data:
  grafana_data:
