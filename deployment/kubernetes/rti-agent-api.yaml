apiVersion: apps/v1
kind: Deployment
metadata:
  name: rti-agent-api
  labels:
    app: rti-agent-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rti-agent-api
  template:
    metadata:
      labels:
        app: rti-agent-api
    spec:
      containers:
        - name: api
          image: rti-agent-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: rti-agent-secrets
            - configMapRef:
                name: rti-agent-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: rti-agent-api
spec:
  selector:
    app: rti-agent-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rti-agent-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rti-agent-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

