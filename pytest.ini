[pytest]
asyncio_mode = auto
markers =
    unit: isolated unit tests
    integration: end-to-end integration tests
    benchmark: performance benchmarks
    slow: long-running tests
    rag: retrieval pipeline tests
    ocr: OCR pipeline tests
    queue: ingestion queue tests
    vectorstore: vector DB tests
    hallucination: hallucination scoring tests
    security: injection/guardrail tests
    multilingual: multilingual processing tests
